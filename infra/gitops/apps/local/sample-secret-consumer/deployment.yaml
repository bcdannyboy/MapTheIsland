apiVersion: apps/v1
kind: Deployment
metadata:
  name: maptheisland-local-sample-consumer
  namespace: maptheisland-dev-application
  labels:
    app.kubernetes.io/name: maptheisland-local-sample-consumer
    maptheisland.io/scope: local-only
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: maptheisland-local-sample-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maptheisland-local-sample-consumer
        maptheisland.io/scope: local-only
    spec:
      serviceAccountName: maptheisland-local-sample-consumer
      containers:
        - name: sample-consumer
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - sleep 3600
          env:
            - name: SAMPLE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maptheisland-local-sample-runtime
                  key: API_TOKEN
          volumeMounts:
            - name: sample-tls
              mountPath: /var/run/maptheisland/tls
              readOnly: true
      volumes:
        - name: sample-tls
          secret:
            secretName: maptheisland-local-sample-tls
