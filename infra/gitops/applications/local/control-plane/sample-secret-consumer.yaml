apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maptheisland-local-sample-secret-consumer
  namespace: maptheisland-dev-foundation-system
  labels:
    maptheisland.io/scope: local-only
spec:
  project: maptheisland-local-platform
  destination:
    namespace: maptheisland-dev-application
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/bcdannyboy/MapTheIsland.git
    targetRevision: main
    path: infra/gitops/apps/local/sample-secret-consumer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
