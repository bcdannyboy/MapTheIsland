apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maptheisland-local-external-secrets
  namespace: maptheisland-dev-foundation-system
  labels:
    maptheisland.io/scope: local-only
spec:
  project: maptheisland-local-platform
  destination:
    namespace: maptheisland-dev-foundation-system
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.0.1
      helm:
        releaseName: maptheisland-external-secrets
        valueFiles:
          - $values/infra/helm/values/control-plane/external-secrets.local-values.yaml
    - repoURL: https://github.com/bcdannyboy/MapTheIsland.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
