{{- range $name, $config := .Values.priorityClasses }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ printf "%s-%s" $.Values.namespacePrefix $name | quote }}
  labels:
    maptheisland.io/foundation-chart: "platform-foundation"
value: {{ $config.value }}
globalDefault: false
description: {{ $config.description | quote }}
---
{{- end }}
