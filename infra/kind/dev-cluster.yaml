kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "maptheisland.io/control-plane=true"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "maptheisland.io/nodepool=general,maptheisland.io/storage-profile=general"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "maptheisland.io/nodepool=stateful,maptheisland.io/storage-profile=stateful_ssd"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "maptheisland.io/nodepool=gpu,maptheisland.io/storage-profile=gpu_scratch"
            register-with-taints: "maptheisland.io/accelerator=true:NoSchedule"
