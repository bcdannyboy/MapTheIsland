name: ci

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "docs/implementation/**"
      - "infra/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pyproject.toml"
      - "tests/**"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "docs/implementation/**"
      - "infra/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pyproject.toml"
      - "tests/**"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-validation:
    name: Python validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync Python dependencies
        run: uv sync --dev

      - name: Run Python quality gates
        run: |
          uv run ruff check .
          uv run mypy libs/schemas/src libs/contracts/src libs/policy/src tests
          uv run pytest

  infra-validation:
    name: Infrastructure validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Add control-plane chart repositories
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          helm repo add external-secrets https://charts.external-secrets.io --force-update
          helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm repo update

      - name: Run Terraform quality gates
        run: |
          terraform fmt -check -recursive infra/terraform
          TF_DATA_DIR=$PWD/.terraform-cache/dev terraform -chdir=infra/terraform/environments/dev init -backend=false
          TF_DATA_DIR=$PWD/.terraform-cache/dev terraform -chdir=infra/terraform/environments/dev validate

      - name: Run Helm quality gates
        run: |
          helm lint infra/helm/charts/platform-foundation -f infra/helm/charts/platform-foundation/values.kind-dev.yaml
          helm template maptheisland-platform infra/helm/charts/platform-foundation --namespace maptheisland-dev-foundation-system -f infra/helm/charts/platform-foundation/values.kind-dev.yaml >/tmp/platform-foundation.yaml
          helm template maptheisland-argocd argo/argo-cd --version 9.4.7 --namespace maptheisland-dev-foundation-system -f infra/helm/values/control-plane/argocd.local-values.yaml >/tmp/argocd.yaml
          helm template maptheisland-external-secrets external-secrets/external-secrets --version 2.0.1 --namespace maptheisland-dev-foundation-system -f infra/helm/values/control-plane/external-secrets.local-values.yaml >/tmp/external-secrets.yaml
          helm template maptheisland-vault hashicorp/vault --version 0.32.0 --namespace maptheisland-dev-foundation-system -f infra/helm/values/control-plane/vault.local-values.yaml --set server.dev.devRootToken=ci-dry-run-token >/tmp/vault.yaml
          helm template maptheisland-cert-manager jetstack/cert-manager --version v1.19.4 --namespace maptheisland-dev-foundation-system -f infra/helm/values/control-plane/cert-manager.local-values.yaml >/tmp/cert-manager.yaml

  web-validation:
    name: Web validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0"
          cache: "pnpm"

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web quality gates
        run: pnpm check:web
